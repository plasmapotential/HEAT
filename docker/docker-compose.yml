#docker-compose.yml
#Engineer:  T. Looby
#Date: 20240321
#Description: Docker recipe for running HEAT. All values are parameterized via
#             docker/.env (run ./setup.sh to generate it); every variable has a
#             fallback default here, so the stack also works with no .env.
#             Prefer the ./run.sh wrapper at the repo root over raw compose.
#
#Run modes (image uses ENTRYPOINT launchHEAT.py + CMD, so 'command:'/args select the mode):
#  GUI (default):      ./run.sh gui        (or: docker compose up HEAT)
#  TUI/batch:          ./run.sh tui <batchFile>
#  Interactive shell:  ./run.sh shell      (or: docker compose run --rm --entrypoint "" HEAT /bin/bash)
#  With NVIDIA GPU:    HEAT_GPU=1 ./run.sh gui   (or: docker compose --profile gpu up HEAT-gpu)
#
#Local dev: 'setup.sh --dev' writes docker-compose.override.yml, which mounts
#your checkout over the image's HEAT clone at /root/source/HEAT.
services:
  HEAT:
    image: "${HEAT_IMAGE:-plasmapotential/heat}:${HEAT_IMAGE_TAG:-v4.3}"
    ports:
      - "${HEAT_PORT:-8050}:8050"
    volumes:
      # HEAT data/output directory (host side set via HEAT_DATA_DIR in .env)
      - "${HEAT_DATA_DIR:-${HOME}/HEAT}:/root/HEAT"
      # Batch file directory; set per-invocation by './run.sh tui <batchFile>'
      - "${BATCH_DIR:-/tmp}:/root/terminal"
      # Optional stable mount for shared run inputs referenced by absolute
      # /root/HEAT_runs/... paths (host side set via HEAT_RUNS_DIR in .env;
      # unset falls back to the empty named volume below, so stray paths
      # fail loudly instead of resolving against a host directory)
      - "${HEAT_RUNS_DIR:-heat_runs}:/root/HEAT_runs"
    stdin_open: true # docker run -i
    tty: true        # docker run -t
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,graphics
      # HEAT chowns its output to dockerUID:dockerGID (see dashGUI.py /
      # terminalUI.py); 0 matches the plain 'docker run' root behavior.
      - dockerUID=${dockerUID:-0}
      - dockerGID=${dockerGID:-0}
      - OMPI_ALLOW_RUN_AS_ROOT=1
      - OMPI_ALLOW_RUN_AS_ROOT_CONFIRM=1

  # Same service with the NVIDIA GPU reservation; requires the nvidia container
  # runtime, so it is opt-in via the 'gpu' profile (HEAT_GPU=1 with run.sh).
  HEAT-gpu:
    extends:
      service: HEAT
    profiles: ["gpu"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all         # or 1
              capabilities: [gpu]

# Empty fallback for the HEAT_RUNS_DIR mount when the variable is unset.
volumes:
  heat_runs:
